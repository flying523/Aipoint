<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prompt 智能寶庫</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        .card { transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <!-- 標題區域 -->
        <header class="text-center mb-10">
            <h1 class="text-3xl font-bold mb-4 flex items-center justify-center gap-2">
                🚀 AI Prompt 智能寶庫
            </h1>
            <a href="https://docs.google.com/spreadsheets/d/1tNjE1T5E8shqtaTiwQpTZaxT0lkJRmXuF6J8exiW5gc/edit?usp=sharing" 
               target="_blank" class="text-sm text-gray-500 hover:text-blue-600 underline">
                📁 開啟原始資料 Google Sheet
            </a>
        </header>

        <!-- 搜尋與分類 -->
        <div class="mb-10 text-center">
            <input type="text" id="searchInput" placeholder="🔍 搜尋提示詞..." 
                   class="w-full max-w-lg p-4 rounded-full border border-gray-300 shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-400 mb-6">
            
            <div id="filterButtons" class="flex flex-wrap justify-center gap-2">
                <button class="filter-btn px-4 py-2 bg-blue-600 text-white rounded-full text-sm font-medium" data-cat="全部">全部</button>
            </div>
        </div>

        <!-- 卡片容器 -->
        <div id="cardsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            <!-- 動態插入卡片 -->
        </div>
    </div>

    <script>
        // 設定 Google Sheet CSV 下載連結 (使用發布為 CSV 的連結)
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT5E8shqtaTiwQpTZaxT0lkJRmXuF6J8exiW5gc/pub?output=csv';

        async function init() {
            try {
                const response = await fetch(csvUrl);
                const csvData = await response.text();
                const results = Papa.parse(csvData, { header: true });
                render(results.data);
            } catch (err) {
                document.getElementById('cardsGrid').innerHTML = '<p class="col-span-full text-center text-red-500">無法讀取資料，請確認 Google Sheet 是否已公開發布為 CSV。</p>';
            }
        }

        function render(data) {
            const grid = document.getElementById('cardsGrid');
            grid.innerHTML = '';
            
            data.forEach(item => {
                if (!item.標題) return;
                const card = document.createElement('div');
                card.className = 'card bg-white p-6 rounded-2xl shadow-md border-t-4 border-purple-600';
                card.innerHTML = `
                    <div class="text-xs font-bold text-blue-600 mb-2 bg-blue-50 inline-block px-2 py-1 rounded">${item.類別 || '其他'}</div>
                    <h3 class="text-lg font-bold mb-3">${item.標題}</h3>
                    <p class="text-gray-600 text-sm mb-6 h-32 overflow-y-auto">${item.內容 || ''}</p>
                    <button class="w-full py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">複製 Prompt</button>
                `;
                grid.appendChild(card);
            });
        }

        init();
    </script>
</body>
</html>
